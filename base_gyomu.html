<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ベース業務</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="common.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0 auto; padding: 10px; background: #f5f5f5; max-width: 1100px; }
    h1 { font-size: 1.2rem; text-align: center; margin: 10px 0; }
    .back { display: block; text-align: center; margin: 8px 0; color: #4a90e2; text-decoration: none; width: fit-content; margin-left: auto; margin-right: auto; }
    .filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; justify-content: center; }
    .filter-btn { padding: 4px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .filter-btn.active { outline: 3px solid #333; font-weight: bold; }
    .hidden { display: none !important; }
    .msg { text-align: center; font-size: 0.85rem; padding: 6px; border-radius: 4px; margin-bottom: 8px; display: none; }
    .msg.ok  { background: #d4edda; color: #155724; display: block; }
    .msg.err { background: #fdecea; color: #c0392b; display: block; }

    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); font-size: 0.82rem; table-layout: fixed; }
    th { background: #dde; padding: 7px 4px; text-align: center; border-bottom: 2px solid #bbc; }
    td { padding: 5px 3px; text-align: center; border-bottom: 1px solid #f0f0f0; cursor: pointer; overflow: hidden; }
    tr.data-row:hover td { background: #f0f8ff; }
    tr.selected td { background: #fff3cd !important; font-weight: bold; }
    tr.hidden { display: none; }

    /* 編集行（テーブル内に組み込み） */
    tr.edit-row td { background: #fff0f5 !important; cursor: default; padding: 4px 3px; }
    tr.edit-row td select { width: 100%; font-size: 0.8rem; padding: 3px 2px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    tr.btn-row td { background: #fff0f5 !important; cursor: default; padding: 4px 8px; border-bottom: 2px solid #eee; }

    .badge { display: inline-block; padding: 2px 4px; border-radius: 4px; font-size: 0.78rem; font-weight: bold; min-width: 32px; }
    .badge.empty { background: #eee; color: #aaa; }
    .btn-copy { background: #3498db; color: white; border: none; border-radius: 4px; padding: 5px 12px; font-size: 0.82rem; cursor: pointer; }
    .btn-save { background: #27ae60; color: white; border: none; border-radius: 4px; padding: 5px 18px; font-size: 0.82rem; cursor: pointer; }
    .loading { text-align: center; padding: 20px; color: #888; }

    /* レイアウト（左：業務リスト／右：表） */
    .main-layout { display: flex; gap: 8px; align-items: flex-start; }

    /* 業務リスト（左側） */
    .gyomu-list-panel {
      width: 80px; flex-shrink: 0; background: white; border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1); padding: 6px 4px;
      max-height: 80vh; overflow-y: auto; user-select: none;
    }
    .gyomu-list-title { font-size: 0.72rem; color: #888; text-align: center; margin-bottom: 6px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
    .gyomu-item {
      display: block; padding: 3px 4px; margin-bottom: 3px; border-radius: 3px;
      font-size: 0.72rem; font-weight: bold; text-align: center; cursor: grab; word-break: break-all;
    }
    .gyomu-item:active { cursor: grabbing; opacity: 0.7; }
    .gyomu-item.no-tekisei { opacity: 0.5; border: 1px dashed #aaa; }

    .table-wrap { flex: 1; min-width: 0; }
    td.drop-over { background: #fffacd !important; outline: 2px dashed #f39c12; }

    /* 確認ダイアログ */
    .dialog-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:1000; align-items:center; justify-content:center; }
    .dialog-overlay.show { display:flex; }
    .dialog-box { background:white; border-radius:8px; padding:24px; max-width:320px; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.3); }
    .dialog-box p { margin:0 0 16px; font-size:0.9rem; line-height:1.5; white-space: pre-line; }
    .dialog-btns { display:flex; gap:10px; justify-content:center; }
    .dialog-btns button { padding:8px 20px; border:none; border-radius:4px; cursor:pointer; font-size:0.85rem; font-weight:bold; }
    .btn-ok { background:#e67e22; color:white; }
    .btn-cancel { background:#95a5a6; color:white; }
  </style>
</head>
<body>
  <h1 id="page-title">⚙️ ベース業務</h1>
  <a class="back" href="index.html">← メニューへ</a>
  <div id="msg" class="msg"></div>

  <div class="filter-row" id="filter-row">
    <button class="filter-btn active" style="background:#555;color:white" onclick="filterTable('',this,'')">全員</button>
  </div>

  <div id="loading" class="loading">読み込み中...</div>

  <div class="main-layout">
    <div class="gyomu-list-panel" id="gyomu-list-panel">
      <div class="gyomu-list-title">業務リスト</div>
      <div style="text-align:center;margin-bottom:6px;">
        <select id="gyomu-list-mode" onchange="buildGyomuList(selectedCode)" style="font-size:0.68rem;width:100%;padding:2px;">
          <option value="">全部</option>
        </select>
      </div>
      <div id="gyomu-list-items"></div>
    </div>
    <div class="table-wrap">
      <table id="main-table" style="display:none">
        <thead>
          <tr>
            <th style="width:90px">社員コード</th>
            <th style="width:120px">氏名</th>
            <th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="dialog-overlay" id="dialog">
    <div class="dialog-box">
      <p id="dialog-msg"></p>
      <div id="dialog-checkbox-row" style="text-align:left;font-size:0.85rem;margin:8px 0;">
        <label><input type="checkbox" id="dialog-checkbox" checked> この組み合わせを、業務適性にも登録する</label>
      </div>
      <div class="dialog-btns">
        <button class="btn-ok" onclick="dialogOk()">入力する</button>
        <button class="btn-cancel" onclick="dialogCancel()">キャンセル</button>
      </div>
    </div>
  </div>

  <script>
    const DAYS = ['sun','mon','tue','wed','thu','fri','sat'];
    const DAY_LABELS = ['日','月','火','水','木','金','土'];

    let masters = {};
    let staffRows = [];
    let baseMap = {};
    let tekiseiMap = {};
    let selectedCode = null;
    let currentFilter = '';
    let dragGyomuCode = null;
    let dialogResolve = null;

    async function init() {
      masters = await loadMasters();
      buildFilterButtons();
      buildGyomuListModeSelect();
      initTbodyEvents();
      await loadRows();
      buildGyomuList(selectedCode);
    }

    // 業務リストの絞り込みプルダウンに、全所属を追加する
    function buildGyomuListModeSelect() {
      const sel = document.getElementById('gyomu-list-mode');
      masters.bushos.filter(b => !b.busho_code.startsWith('9')).forEach(b => {
        const opt = document.createElement('option');
        opt.value = b.busho_code;
        opt.textContent = b.busho_name;
        sel.appendChild(opt);
      });
    }

    // ===== 業務リスト（左側）=====
    function buildGyomuList(staffCode) {
      const panel = document.getElementById('gyomu-list-items');
      panel.innerHTML = '';

      const tekiseiCodes = new Set(staffCode ? (tekiseiMap[staffCode] || []) : []);

      // 空白
      const emptyItem = document.createElement('div');
      emptyItem.className = 'gyomu-item';
      emptyItem.style.cssText = 'background:#eee;color:#888';
      emptyItem.textContent = '空白';
      emptyItem.draggable = true;
      emptyItem.addEventListener('dragstart', e => { dragGyomuCode = ''; e.dataTransfer.effectAllowed = 'copy'; });
      panel.appendChild(emptyItem);

      // 業務一覧（プルダウンで選んだ所属だけに絞り込む。空欄なら全部）
      const listMode = document.getElementById('gyomu-list-mode')?.value || '';
      const gyomuTargets = (masters.gyomus || [])
        .filter(g => g.is_active !== false)
        .filter(g => !listMode || g.busho_code === listMode)
        .sort((a, b) => a.gyomu_code.localeCompare(b.gyomu_code, undefined, { numeric: true }));
      gyomuTargets.forEach(g => {
        const hasTekisei = !staffCode || tekiseiCodes.has(g.gyomu_code);
        const item = document.createElement('div');
        item.className = 'gyomu-item' + (hasTekisei ? '' : ' no-tekisei');
        const color = g.color_h || '#ccc';
        item.style.background = color;
        item.style.color = getTextColor(color);
        item.textContent = g.gyomu_name;
        item.title = hasTekisei ? g.gyomu_name : `${g.gyomu_name}（適性なし）`;
        item.draggable = true;
        item.addEventListener('dragstart', e => { dragGyomuCode = g.gyomu_code; e.dataTransfer.effectAllowed = 'copy'; });
        panel.appendChild(item);
      });

      // 休日など
      Object.entries(KYUJITSU_MAP).forEach(([code, label]) => {
        const item = document.createElement('div');
        item.className = 'gyomu-item';
        item.style.cssText = 'background:#e0e0e0;color:#c0392b';
        item.textContent = label;
        item.draggable = true;
        item.addEventListener('dragstart', e => { dragGyomuCode = code; e.dataTransfer.effectAllowed = 'copy'; });
        panel.appendChild(item);
      });
    }

    // ===== tbodyのドラッグ＆ドロップ（1回だけ設定） =====
    function initTbodyEvents() {
      const tbody = document.getElementById('tbody');
      tbody.addEventListener('dragover', e => {
        const td = e.target.closest('td.shift-td');
        if (!td) return;
        e.preventDefault();
        document.querySelectorAll('td.drop-over').forEach(el => el.classList.remove('drop-over'));
        td.classList.add('drop-over');
      });
      tbody.addEventListener('dragleave', e => {
        const td = e.target.closest('td.shift-td');
        if (td) td.classList.remove('drop-over');
      });
      tbody.addEventListener('drop', async e => {
        const td = e.target.closest('td.shift-td');
        if (!td) return;
        e.preventDefault();
        td.classList.remove('drop-over');
        const staffCode = td.dataset.staff;
        const dayKey = td.dataset.key;
        const gyomuCode = dragGyomuCode;
        if (gyomuCode === undefined || gyomuCode === null) return;

        if (gyomuCode === '') { await applyDrop(staffCode, dayKey, null); return; }
        if (parseInt(gyomuCode) >= 900) { await applyDrop(staffCode, dayKey, gyomuCode); return; }

        const tekisei = tekiseiMap[staffCode] || [];
        const hasTekisei = tekisei.includes(gyomuCode);
        if (!hasTekisei) {
          const staffName = staffRows.find(s => s.staff_code === staffCode)?.name || staffCode;
          const gyomuName = masters.gyomuMap[gyomuCode]?.gyomu_name || gyomuCode;
          const result = await showDialog(`「${staffName}」は「${gyomuName}」の業務適性がありません。\nそれでも入力しますか？`, true);
          if (!result.ok) return;
          if (result.register) {
            const bushoCode = masters.gyomuMap[gyomuCode]?.busho_code || null;
            const { error } = await sb.from('shift_gyomu_tekisei')
              .insert({ staff_code: staffCode, busho_code: bushoCode, gyomu_code: gyomuCode });
            if (!error) {
              tekiseiMap[staffCode] = [...tekisei, gyomuCode];
            }
            // 所属適性にまだ登録されていなければ、あわせて登録する
            if (bushoCode) {
              const { data: existingBusho } = await sb.from('shift_busho_tekisei')
                .select('id').eq('staff_code', staffCode).eq('busho_code', bushoCode).maybeSingle();
              if (!existingBusho) {
                await sb.from('shift_busho_tekisei').insert({ staff_code: staffCode, busho_code: bushoCode });
              }
            }
          }
        }
        await applyDrop(staffCode, dayKey, gyomuCode);
      });
    }

    // ドロップされた内容を、その場でデータベースに保存する（1曜日分だけ）
    async function applyDrop(staffCode, dayKey, gyomuCode) {
      const exists = baseMap[staffCode];
      let error;
      if (exists) {
        ({ error } = await sb.from('shift_base_gyomu').update({ [dayKey + '_gyomu']: gyomuCode }).eq('staff_code', staffCode));
      } else {
        const initData = { staff_code: staffCode };
        DAYS.forEach(d => { initData[d + '_gyomu'] = d === dayKey ? gyomuCode : null; });
        ({ error } = await sb.from('shift_base_gyomu').insert(initData));
      }
      if (error) { showMsg('保存に失敗しました: ' + error.message, 'err'); return; }
      if (!baseMap[staffCode]) baseMap[staffCode] = { staff_code: staffCode };
      baseMap[staffCode][dayKey + '_gyomu'] = gyomuCode;
      showMsg('保存しました', 'ok');
      renderTable();
    }

    // ===== ダイアログ =====
    function showDialog(msg, showCheckbox = false) {
      return new Promise(resolve => {
        document.getElementById('dialog-msg').textContent = msg;
        const row = document.getElementById('dialog-checkbox-row');
        row.style.display = showCheckbox ? 'block' : 'none';
        document.getElementById('dialog-checkbox').checked = true;
        document.getElementById('dialog').classList.add('show');
        dialogResolve = resolve;
      });
    }
    function dialogOk() {
      document.getElementById('dialog').classList.remove('show');
      const register = document.getElementById('dialog-checkbox').checked;
      if (dialogResolve) dialogResolve({ ok: true, register });
    }
    function dialogCancel() {
      document.getElementById('dialog').classList.remove('show');
      if (dialogResolve) dialogResolve({ ok: false, register: false });
    }

    function buildFilterButtons() {
      const row = document.getElementById('filter-row');
      masters.bushos.filter(b => parseInt(b.busho_code) < 900).forEach(b => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.style.background = b.color_h;
        btn.style.color = getTextColor(b.color_h);
        btn.textContent = b.busho_name;
        btn.onclick = () => filterTable(b.busho_code, btn, b.busho_name);
        row.appendChild(btn);
      });
    }

    async function loadRows() {
      const [staffRes, baseRes, tekiseiRes] = await Promise.all([
        sb.from('shift_staff').select('*').order('staff_code'),
        sb.from('shift_base_gyomu').select('*'),
        sb.from('shift_gyomu_tekisei').select('staff_code, gyomu_code'),
      ]);
      if (staffRes.error) { showMsg('読み込みに失敗しました', 'err'); return; }
      staffRows = (staffRes.data || []).filter(s => !s.retired);
      baseMap = Object.fromEntries((baseRes.data || []).map(r => [r.staff_code, r]));
      tekiseiMap = {};
      (tekiseiRes.data || []).forEach(r => {
        if (!tekiseiMap[r.staff_code]) tekiseiMap[r.staff_code] = [];
        tekiseiMap[r.staff_code].push(r.gyomu_code);
      });
      renderTable();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('main-table').style.display = '';
    }

    const KYUJITSU_MAP = { '901': '休日', '902': '有休', '903': '健診' };

    function getBadgeHtml(code) {
      if (!code || code === 'EMPTY') return `<span class="badge empty">－</span>`;
      // 900番台（休日など）→ 赤文字
      if (parseInt(code) >= 900) {
        const label = KYUJITSU_MAP[code] || masters.bushoMap[code]?.busho_name || code;
        return `<span class="badge" style="background:#e0e0e0;color:#c0392b;font-weight:bold">${label}</span>`;
      }
      const g = masters.gyomuMap[code];
      if (g) {
        const color = g.color_h || '#ccc';
        return `<span class="badge" style="background:${color};color:${getTextColor(color)}">${g.gyomu_name}</span>`;
      }
      const b = masters.bushoMap[code];
      if (b) {
        const color = b.color_h || '#ccc';
        return `<span class="badge" style="background:${color};color:${getTextColor(color)}">${b.busho_name}</span>`;
      }
      return `<span class="badge empty">${code}</span>`;
    }

    function buildSelectHtml(id, staffCode, currentVal) {
      const gyomuCodes = tekiseiMap[staffCode] || [];
      const grouped = {};
      gyomuCodes.forEach(code => {
        const g = masters.gyomuMap[code];
        if (!g) return;
        if (!grouped[g.busho_code]) grouped[g.busho_code] = [];
        grouped[g.busho_code].push(g);
      });

      let html = `<select id="${id}"><option value="">－</option>`;
      Object.keys(grouped).sort().forEach(bCode => {
        const bName = masters.bushoMap[bCode]?.busho_name || bCode;
        html += `<optgroup label="${bName}">`;
        grouped[bCode]
          .sort((a, b) => a.gyomu_code.localeCompare(b.gyomu_code, undefined, { numeric: true }))
          .forEach(g => {
            const sel = g.gyomu_code === currentVal ? ' selected' : '';
            html += `<option value="${g.gyomu_code}"${sel}>${g.gyomu_name}</option>`;
          });
        html += `</optgroup>`;
      });
      html += `<optgroup label="休日など">`;
      Object.entries(KYUJITSU_MAP).forEach(([code, label]) => {
        const sel = code === currentVal ? ' selected' : '';
        html += `<option value="${code}"${sel}>${label}</option>`;
      });
      html += `</optgroup></select>`;
      return html;
    }

    function renderTable() {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      staffRows.forEach(s => {
        const base = baseMap[s.staff_code] || {};
        // フィルター判定：所属一致 OR ベース業務にその所属の業務が1つでも含まれる
        let isHidden = false;
        if (currentFilter) {
          const base = baseMap[s.staff_code] || {};
          const hasBusho = s.busho_code === currentFilter;
          const hasGyomu = DAYS.some(d => {
            const code = base[d + '_gyomu'];
            if (!code || code === 'EMPTY') return false;
            // 業務コードの場合：その業務の所属コードで判定
            const g = masters.gyomuMap[code];
            if (g) return g.busho_code === currentFilter;
            // 所属コードそのものの場合
            return code === currentFilter;
          });
          isHidden = !hasBusho && !hasGyomu;
        }

        // データ行
        const tr = document.createElement('tr');
        tr.className = 'data-row';
        if (isHidden) tr.classList.add('hidden');
        if (s.staff_code === selectedCode) tr.classList.add('selected');
        tr.onclick = () => toggleEdit(s);

        let html = `<td>${s.staff_code}</td><td>${s.name || ''}</td>`;
        DAYS.forEach(d => {
          html += `<td class="shift-td" data-staff="${s.staff_code}" data-key="${d}">${getBadgeHtml(base[d + '_gyomu'])}</td>`;
        });
        tr.innerHTML = html;
        tbody.appendChild(tr);

        // 編集行（選択中のみ表示）
        if (s.staff_code === selectedCode) {
          const editTr = document.createElement('tr');
          editTr.className = 'edit-row';

          let editHtml = `<td colspan="2" style="text-align:left;padding-left:8px;font-size:0.8rem;color:#888">▲ 編集中</td>`;
          DAYS.forEach((d, i) => {
            editHtml += `<td>${buildSelectHtml('sel_' + d, s.staff_code, base[d + '_gyomu'] || '')}</td>`;
          });
          if (isHidden) editTr.classList.add('hidden');
          editTr.innerHTML = editHtml;
          tbody.appendChild(editTr);

          // ボタン行
          const btnTr = document.createElement('tr');
          btnTr.className = 'btn-row';
          btnTr.innerHTML = `
            <td colspan="9" style="text-align:left">
              <button class="btn-copy" onclick="copyFromSun()">日曜日を全曜日にコピー</button>
              <button class="btn-save" onclick="saveRow('${s.staff_code}')" style="margin-left:8px">保存</button>
            </td>`;
          if (isHidden) btnTr.classList.add('hidden');
          tbody.appendChild(btnTr);
        }
      });
    }

    function toggleEdit(staff) {
      if (selectedCode === staff.staff_code) {
        selectedCode = null;
      } else {
        selectedCode = staff.staff_code;
      }
      renderTable();
      buildGyomuList(selectedCode);
      if (selectedCode) {
        // 選択行にスクロール
        const rows = document.querySelectorAll('tr.selected');
        if (rows.length > 0) rows[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    function filterTable(bushoCode, btn, bushoName) {
      currentFilter = bushoCode;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      // タイトル更新
      document.getElementById('page-title').textContent =
        bushoCode ? `⚙️ ベース業務 - ${bushoName}` : '⚙️ ベース業務';
      renderTable();
    }

    function copyFromSun() {
      const sunVal = document.getElementById('sel_sun').value;
      DAYS.forEach(d => {
        const sel = document.getElementById(`sel_${d}`);
        if (sel) sel.value = sunVal;
      });
    }

    async function saveRow(staffCode) {
      const data = { staff_code: staffCode };
      DAYS.forEach(d => {
        const sel = document.getElementById(`sel_${d}`);
        data[d + '_gyomu'] = sel ? (sel.value || null) : null;
      });
      const exists = baseMap[staffCode];
      let error;
      if (exists) {
        ({ error } = await sb.from('shift_base_gyomu').update(data).eq('staff_code', staffCode));
      } else {
        ({ error } = await sb.from('shift_base_gyomu').insert(data));
      }
      if (error) { showMsg('保存に失敗しました: ' + error.message, 'err'); return; }
      showMsg('保存しました', 'ok');
      baseMap[staffCode] = data;
      renderTable();
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = `msg ${type}`;
      setTimeout(() => { el.className = 'msg'; }, 3000);
    }

    init();
  </script>
</body>
</html>
