<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>業務マスタ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="common.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0 auto; padding: 10px; background: #f5f5f5; max-width: 900px; }
    h1 { font-size: 1.2rem; text-align: center; margin: 10px 0; }
    .back { display: block; text-align: center; margin: 8px 0; color: #4a90e2; text-decoration: none; width: fit-content; margin-left: auto; margin-right: auto; }
    .filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; justify-content: center; }
    .filter-btn { padding: 4px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .filter-btn.active { outline: 3px solid #333; font-weight: bold; }
    .hidden { display: none !important; }
    .msg { text-align: center; font-size: 0.85rem; padding: 6px; border-radius: 4px; margin-bottom: 8px; display: none; }
    .msg.ok  { background: #d4edda; color: #155724; display: block; }
    .msg.err { background: #fdecea; color: #c0392b; display: block; }

    /* フォーム */
    .form-box { background: #fff0e8; border-radius: 8px; padding: 8px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .form-table { width: 100%; table-layout: fixed; border-collapse: separate; border-spacing: 4px 0; display: table; }
    .form-cell { display: table-cell; vertical-align: bottom; }
    .form-cell label { display: block; font-size: 0.75rem; color: #666; text-align: center; margin-bottom: 3px; }
    .form-cell input, .form-cell select {
      width: 100%; font-size: 0.85rem; padding: 4px 2px;
      border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; text-align: center;
    }
    .btn-row { display: flex; gap: 6px; margin-top: 6px; }
    button { font-size: 0.85rem; padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; color: white; }
    .btn-add    { background: #4a90e2; }
    .btn-update { background: #27ae60; }
    .btn-delete { background: #e74c3c; }

    /* テーブル */
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); font-size: 0.85rem; table-layout: fixed; }
    th { background: #eee; padding: 7px 4px; text-align: center; border-bottom: 1px solid #ddd; }
    td { padding: 6px 4px; text-align: center; border-bottom: 1px solid #f0f0f0; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    tr:hover td { background: #f0f8ff; }
    tr.selected td { background: #d0e8ff !important; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
    .loading { text-align: center; padding: 20px; color: #888; }
  </style>
</head>
<body>
  <h1>⚙️ 業務マスタ</h1>
  <a class="back" href="index.html">← メニューへ</a>
  <div id="msg" class="msg"></div>

  <!-- 所属フィルター -->
  <div class="filter-row" id="filter-row">
    <button class="filter-btn active" style="background:#555;color:white" onclick="filterTable('',this)">全員</button>
  </div>

  <!-- 入力フォーム -->
  <div class="form-box">
    <div class="form-table">
      <div class="form-cell" style="width:80px">
        <label>所属</label>
        <select id="f_busho"><option value="">-- 未選択 --</option></select>
      </div>
      <div class="form-cell" style="width:110px">
        <label>業務コード</label>
        <input type="text" id="f_code" placeholder="例：801-01">
      </div>
      <div class="form-cell" style="width:160px">
        <label>業務名</label>
        <input type="text" id="f_name" placeholder="例：六本木">
      </div>
      <div class="form-cell" style="width:46px">
        <label>色</label>
        <input type="color" id="f_color" value="#ffaaaa" style="padding:1px;height:29px;cursor:pointer;">
      </div>
      <div class="form-cell" style="width:110px">
        <label>カラーコード</label>
        <input type="text" id="f_color_text" placeholder="#FFAAAA" maxlength="7">
      </div>
      <div class="form-cell" style="width:60px">
        <label>有効</label>
        <select id="f_active">
          <option value="true">有効</option>
          <option value="false">無効</option>
        </select>
      </div>
      <div class="form-cell" style="width:130px">
        <label>&nbsp;</label>
        <button type="button" style="background:#8e44ad;width:100%;white-space:normal;" onclick="autoColorFromBusho()">🎨 所属色から自動生成</button>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-add"    onclick="saveRow('add')">新規登録</button>
      <button class="btn-update" onclick="saveRow('update')">更新</button>
      <button class="btn-delete" onclick="deleteRow()">削除</button>
    </div>
  </div>

  <!-- 一覧テーブル -->
  <div id="loading" class="loading">読み込み中...</div>
  <table id="main-table" style="display:none">
    <thead>
      <tr>
        <th style="width:80px">所属</th>
        <th style="width:110px">業務コード</th>
        <th style="width:160px">業務名</th>
        <th style="width:156px">色</th>
        <th style="width:60px">有効</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    let masters = {};
    let rows = [];
    let selectedCode = null;
    let currentFilter = '';

    // カラーピッカー ↔ テキスト連動
    document.getElementById('f_color').addEventListener('input', e => {
      document.getElementById('f_color_text').value = e.target.value.toUpperCase();
    });
    document.getElementById('f_color_text').addEventListener('input', e => {
      const v = e.target.value;
      if (/^#[0-9A-Fa-f]{6}$/.test(v)) {
        document.getElementById('f_color').value = v;
      }
    });

    // 色を白に30%近づけて薄くする
    function lightenColor(hex, ratio) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      const nr = Math.round(r + (255 - r) * ratio);
      const ng = Math.round(g + (255 - g) * ratio);
      const nb = Math.round(b + (255 - b) * ratio);
      return '#' + [nr, ng, nb].map(v => v.toString(16).padStart(2, '0')).join('').toUpperCase();
    }

    function autoColorFromBusho() {
      const bushoCode = document.getElementById('f_busho').value;
      if (!bushoCode) { showMsg('先に所属を選んでください', 'err'); return; }
      const busho = masters.bushoMap[bushoCode];
      if (!busho || !busho.color_h) { showMsg('その所属の色が見つかりません', 'err'); return; }
      const lightened = lightenColor(busho.color_h, 0.4);
      document.getElementById('f_color').value = lightened;
      document.getElementById('f_color_text').value = lightened;
    }

    async function init() {
      masters = await loadMasters();
      buildFilterButtons();
      buildSelects();
      lockMasterFormIfNeeded();
      await loadRows();
    }

    function buildFilterButtons() {
      const row = document.getElementById('filter-row');
      masters.bushos.filter(b => !b.busho_code.startsWith('9')).forEach(b => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.style.background = b.color_h;
        btn.style.color = getTextColor(b.color_h);
        btn.textContent = b.busho_name;
        btn.onclick = () => filterTable(b.busho_code, btn);
        row.appendChild(btn);
      });
    }

    function buildSelects() {
      const sel = document.getElementById('f_busho');
      masters.bushos.filter(b => !b.busho_code.startsWith('9')).forEach(b => {
        const opt = document.createElement('option');
        opt.value = b.busho_code;
        opt.textContent = b.busho_name;
        sel.appendChild(opt);
      });
    }

    async function loadRows() {
      const { data, error } = await sb.from('shift_gyomu').select('*').order('gyomu_code');
      if (error) { showMsg('データの読み込みに失敗しました: ' + error.message, 'err'); return; }
      rows = data || [];
      renderTable();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('main-table').style.display = '';
    }

    function renderTable() {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      rows.forEach(r => {
        const busho = masters.bushoMap[r.busho_code];
        const isHidden = currentFilter && r.busho_code !== currentFilter;
        const tr = document.createElement('tr');
        if (isHidden) tr.classList.add('hidden');
        if (r.gyomu_code === selectedCode) tr.classList.add('selected');
        tr.onclick = () => selectRow(r);

        const color = r.color_h || '#cccccc';
        const textColor = getTextColor(color);
        const bushoHtml = busho
          ? `<span class="badge" style="background:${busho.color_h};color:${getTextColor(busho.color_h)}">${busho.busho_name}</span>`
          : '－';

        tr.innerHTML = `
          <td>${bushoHtml}</td>
          <td>${r.gyomu_code}</td>
          <td><span class="badge" style="background:${color};color:${textColor}">${r.gyomu_name || ''}</span></td>
          <td><span class="badge" style="background:${color};color:${textColor}">${color}</span></td>
          <td>${r.is_active ? '有効' : '無効'}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function selectRow(r) {
      selectedCode = r.gyomu_code;
      const color = r.color_h || '#cccccc';
      document.getElementById('f_busho').value      = r.busho_code  || '';
      document.getElementById('f_code').value       = r.gyomu_code  || '';
      document.getElementById('f_name').value       = r.gyomu_name  || '';
      document.getElementById('f_color').value      = color;
      document.getElementById('f_color_text').value = color.toUpperCase();
      document.getElementById('f_active').value     = r.is_active ? 'true' : 'false';
      renderTable();
    }

    function filterTable(bushoCode, btn) {
      currentFilter = bushoCode;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      else document.querySelector('.filter-btn').classList.add('active');
      renderTable();
    }

    async function saveRow(mode) {
      if (!canEdit()) { showMsg('閲覧のみモードのため変更できません', 'err'); return; }
      const code = document.getElementById('f_code').value.trim();
      const name = document.getElementById('f_name').value.trim();
      if (!code) { showMsg('業務コードを入力してください', 'err'); return; }
      if (!name) { showMsg('業務名を入力してください', 'err'); return; }

      const colorText = document.getElementById('f_color_text').value.trim().toUpperCase();
      const color = /^#[0-9A-F]{6}$/.test(colorText) ? colorText : document.getElementById('f_color').value.toUpperCase();

      const data = {
        gyomu_code: code,
        busho_code: document.getElementById('f_busho').value || null,
        gyomu_name: name,
        color_h:    color,
        is_active:  document.getElementById('f_active').value === 'true',
      };

      if (mode === 'add') {
        const exists = rows.find(r => r.gyomu_code === code);
        if (exists) { showMsg(`業務コード「${code}」はすでに存在します`, 'err'); return; }
        const { error } = await sb.from('shift_gyomu').insert(data);
        if (error) { showMsg('登録に失敗しました: ' + error.message, 'err'); return; }
        showMsg('登録しました', 'ok');
      } else {
        const { error } = await sb.from('shift_gyomu').update(data).eq('gyomu_code', code);
        if (error) { showMsg('更新に失敗しました: ' + error.message, 'err'); return; }
        showMsg('更新しました', 'ok');
      }
      selectedCode = code;
      await loadRows();
    }

    async function deleteRow() {
      if (!canEdit()) { showMsg('閲覧のみモードのため削除できません', 'err'); return; }
      const code = document.getElementById('f_code').value.trim();
      if (!code) { showMsg('削除する業務を選択してください', 'err'); return; }
      if (!confirm(`「${code}」を削除しますか？`)) return;
      const { error } = await sb.from('shift_gyomu').delete().eq('gyomu_code', code);
      if (error) { showMsg('削除に失敗しました: ' + error.message, 'err'); return; }
      showMsg('削除しました', 'ok');
      selectedCode = null;
      document.getElementById('f_code').value = '';
      document.getElementById('f_name').value = '';
      await loadRows();
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = `msg ${type}`;
      setTimeout(() => { el.className = 'msg'; }, 3000);
    }

    init();
  </script>
</body>
</html>
