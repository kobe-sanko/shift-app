<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフト管理システム</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="common.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0 auto; padding: 20px; background: #f5f5f5; max-width: 860px; }
    h1 { font-size: 1.3rem; text-align: center; margin: 10px 0 24px; }
    .section { margin-bottom: 20px; }
    .section-title {
      font-size: 0.85rem; color: #555; font-weight: bold;
      border-left: 4px solid #ccc; padding-left: 8px; margin-bottom: 10px;
    }
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    a.menu-btn {
      display: flex; align-items: center; justify-content: center;
      padding: 18px 10px; border-radius: 8px; text-decoration: none;
      color: white; font-size: 1rem; font-weight: bold;
      text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: opacity 0.15s;
    }
    a.menu-btn:hover { opacity: 0.85; }
    .c-master   { background: #e67e22; }
    .c-config   { background: #505050; }
    .c-tekisei  { background: #16a085; }
    .c-shift    { background: #8e44ad; }
    .c-banmen   { background: #2980b9; }
    .c-oen      { background: #27ae60; }
    .c-haken    { background: #c0392b; }
    .c-kintai   { background: #1a5276; }
    .c-parking  { background: #6c3483; }
    .c-import   { background: #1a6a3a; }
    @media (max-width: 768px) {
      .pc-only { display: none; }
      .sp-show { display: block; }
    }
    @media (min-width: 769px) {
      .sp-show { display: none; }
    }
  </style>
</head>
<body>
  <h1>📅 シフト管理システム</h1>

  <!-- スマホ専用メニュー -->
  <div class="section sp-show">
    <div class="section-title">🖥️ 運用</div>
    <div class="btn-grid">
      <a href="banmen.html" class="menu-btn c-banmen">盤面</a>
      <a href="shift_gyoumu.html" class="menu-btn c-shift">業務シフト</a>
      <a href="chusyajo.html" class="menu-btn c-parking">🅿️ 駐車場状況</a>
    </div>
  </div>

  <!-- PC用メニュー -->
  <div class="section pc-only">
    <div class="section-title">📋 シフト</div>
    <div class="btn-grid">
      <a href="base_gyomu.html" class="menu-btn c-shift">ベース業務</a>
      <a href="shift_gyoumu.html" class="menu-btn c-shift">業務シフト</a>
    </div>
  </div>

  <div class="section pc-only">
    <div class="section-title">🖥️ 運用</div>
    <div class="btn-grid">
      <a href="banmen.html" class="menu-btn c-banmen">盤面</a>
      <a href="oen.html" class="menu-btn c-oen">応援一覧</a>
      <a href="haken_total.html" class="menu-btn c-haken">派遣集計</a>
      <a href="kintai.html" class="menu-btn c-kintai">勤怠管理</a>
      <a href="chusyajo.html" class="menu-btn c-parking">🅿️ 駐車場状況</a>
      <a href="banmen_config.html" class="menu-btn c-config">盤面設定</a>
    </div>
  </div>

  <div class="section pc-only">
    <div class="section-title">✅ 適性</div>
    <div class="btn-grid">
      <a href="syozoku_tekisei.html" class="menu-btn c-tekisei">所属適性</a>
      <a href="gyomu_tekisei.html" class="menu-btn c-tekisei">業務適性</a>
    </div>
  </div>

  <div class="section pc-only">
    <div class="section-title">🗂️ マスタ</div>
    <div class="btn-grid">
      <a href="master_staff.html" class="menu-btn c-master">社員</a>
      <a href="master_busho.html" class="menu-btn c-master">所属</a>
      <a href="master_gyomu.html" class="menu-btn c-master">業務</a>
      <a href="master_car.html" class="menu-btn c-master">車両管理</a>
      <a href="master_syaken.html" class="menu-btn c-master">車検管理</a>
      <a href="master_haken.html" class="menu-btn c-master">派遣会社</a>
      <a href="master_shotnichi.html" class="menu-btn c-master">月間所定日数</a>
      <a href="master_chusyajo.html" class="menu-btn c-master">駐車場</a>
      <a href="import.html" class="menu-btn c-import">データインポート</a>
    </div>
  </div>
</body>
</html>
