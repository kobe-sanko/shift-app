<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>盤面</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="common.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; background: #eee; font-size: 0.82rem; }

    /* ===== 上部バー ===== */
    .top-bar {
      display: flex; align-items: center; gap: 8px; padding: 6px 10px;
      background: #333; color: white; position: sticky; top: 0; z-index: 100;
    }
    .top-bar a { color: #adf; text-decoration: none; font-size: 0.82rem; }
    .date-nav { display: flex; align-items: center; gap: 6px; margin: 0 auto; }
    .date-nav button { background: #555; color: white; border: none; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 1rem; }
    .date-nav button:hover { background: #777; }
    .date-label { font-size: 1rem; font-weight: bold; min-width: 120px; text-align: center; }
    .btn-top { padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.78rem; font-weight: bold; }
    .btn-recreate { background: #e67e22; color: white; }
    .btn-excel { background: #27ae60; color: white; }
    .btn-config { background: #666; color: white; }

    /* ===== レイアウト ===== */
    .main-layout { display: flex; height: calc(100vh - 38px); }

    /* ===== 左パネル ===== */
    .left-panel {
      width: 110px; flex-shrink: 0; background: #f8f8f8;
      border-right: 1px solid #ccc; padding: 4px;
      display: flex; flex-direction: column; height: 100%;
    }
    .list-section {
      display: flex; flex-direction: column; min-height: 0;
    }
    .list-section.staff-section { flex: 4; }
    .list-section.car-section { flex: 4; }
    .list-section.haken-section { flex: 2; }
    .list-section-title {
      font-size: 0.72rem; font-weight: bold; color: #555;
      padding: 4px 2px 2px; border-bottom: 1px solid #ddd; margin-bottom: 4px;
      display: flex; align-items: center; gap: 4px; flex-shrink: 0;
    }
    .list-scroll { overflow-y: auto; flex: 1; min-height: 0; }
    .list-item {
      width: 100%; box-sizing: border-box;
      padding: 3px 5px; margin-bottom: 2px; border-radius: 3px;
      cursor: grab; font-size: 0.75rem; background: white;
      border: 1px solid #ddd; user-select: none;
      text-align: center;
    }
    .list-item:active { cursor: grabbing; opacity: 0.6; }
    .list-item.staff { border-left: 3px solid #4a90e2; }
    .list-item.car { border-left: 3px solid #e67e22; background: #fffbf0; }
    .list-item.haken { border-left: 3px solid #e91e9c; background: #fff0f8; }

    /* ===== メインエリア ===== */
    .main-area { flex: 1; overflow: auto; padding: 8px; }
    .board-grid {
      display: grid;
      gap: 8px;
    }

    /* ===== スマホ表示：左パネルを消して縦一列に・見る専用なので操作ボタンも非表示 ===== */
    @media (max-width: 768px) {
      .left-panel { display: none; }
      .btn-recreate, .btn-excel, .btn-config { display: none !important; }
      .top-bar { gap: 4px; padding: 6px 6px; }
      .top-bar a { white-space: nowrap; flex-shrink: 0; font-size: 0.78rem; }
      .date-nav { gap: 3px; }
      .date-label { min-width: 92px; font-size: 0.88rem; white-space: nowrap; }
      .date-nav button { padding: 4px 7px; }
    }

    /* ===== 所属カード ===== */
    .busho-card {
      background: white; border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15); overflow: hidden;
    }
    .busho-header {
      padding: 5px 10px; text-align: center; font-weight: bold;
      font-size: 0.9rem; color: white;
    }
    .busho-body { padding: 6px; }

    /* ===== 業務ブロック ===== */
    .gyomu-block { margin-bottom: 6px; }
    .gyomu-label {
      font-size: 0.72rem; font-weight: bold; padding: 2px 6px;
      border-radius: 3px 3px 0 0; display: inline-block; margin-bottom: 2px;
    }
    .gyomu-label.haiso { background: #d0e8ff; color: #1a5276; border-left: 3px solid #2980b9; }
    .gyomu-label.souko { background: #fde8c0; color: #784212; border-left: 3px solid #e67e22; }
    .gyomu-label.jimu  { background: #e8d5ff; color: #4a235a; border-left: 3px solid #8e44ad; }

    /* ===== 配送テーブル ===== */
    .haiso-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .haiso-table th {
      font-size: 0.65rem; color: #888; font-weight: normal;
      padding: 1px 3px; text-align: center; border-bottom: 1px solid #eee;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .haiso-table td {
      padding: 1px 2px; text-align: center; vertical-align: middle;
    }
    .cell-box {
      min-height: 22px; border: 1px dashed #ccc; border-radius: 3px;
      font-size: 0.72rem; padding: 1px 3px; display: flex;
      align-items: center; justify-content: center;
      background: #fafafa; cursor: pointer; min-width: 44px;
    }
    .cell-box:hover { background: #f0f8ff; border-color: #4a90e2; }
    .cell-box.drop-over { background: #fffacd !important; border: 2px dashed #f39c12 !important; }
    .cell-box.filled { background: #fff8e0; border: 1px solid #ccc; }
    .cell-box.osoban { border: 2px solid #e67e22 !important; background: #fff3e0; }
    .cell-box.car-cell { background: #fff8f0; }

    /* 倉庫・事務の人員表 */
    .person-grid { display: flex; flex-wrap: wrap; gap: 3px; padding: 2px; }
    .person-box {
      min-width: 44px; min-height: 22px; border: 1px dashed #ccc;
      border-radius: 3px; font-size: 0.72rem; padding: 1px 4px;
      display: flex; align-items: center; justify-content: center;
      background: #fafafa; cursor: pointer;
    }
    .person-box:hover { background: #f0f8ff; border-color: #4a90e2; }
    .person-box span { text-align: center; }
    .person-box.filled { background: #fff8e0; border: 1px solid #ccc; }
    .person-box.drop-over { background: #fffacd !important; border: 2px dashed #f39c12 !important; }

    /* ===== お休みカード ===== */
    .yasumi-card {
      background: white; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      overflow: hidden;
    }
    .yasumi-header {
      padding: 5px 10px; background: #aaa; text-align: center;
      font-weight: bold; color: #c0392b;
    }
    .yasumi-body { padding: 6px; }
    .yasumi-type { font-size: 0.72rem; font-weight: bold; color: #c0392b; margin: 4px 0 2px; }

    /* ===== 応援カード ===== */
    .oen-card {
      background: #1a7a3a; border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15); overflow: hidden;
    }
    .oen-header {
      padding: 5px 10px; text-align: center; font-weight: bold; color: white;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .oen-body { padding: 8px; background: white; }
    .oen-select { width: 100%; font-size: 0.8rem; padding: 4px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 6px; }
    .oen-btn { width: 100%; background: #27ae60; color: white; border: none; border-radius: 4px; padding: 6px; font-size: 0.82rem; font-weight: bold; cursor: pointer; }
    .oen-btn:hover { background: #1e8449; }
    .oen-list { margin-top: 6px; }
    .oen-item {
      font-size: 0.75rem; padding: 2px 4px; background: #e8f8ee;
      border-radius: 3px; margin-bottom: 2px; display: flex;
      justify-content: space-between; align-items: center;
    }
    .oen-del { background: none; border: none; color: #c0392b; cursor: pointer; font-size: 0.8rem; }

    .loading { text-align: center; padding: 40px; color: #888; font-size: 1rem; }
    .msg { position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
      padding: 8px 20px; border-radius: 6px; font-size: 0.85rem; z-index: 200;
      display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .msg.ok  { background: #d4edda; color: #155724; display: block; }
    .msg.err { background: #fdecea; color: #c0392b; display: block; }

    /* 確認ダイアログ */
    .dialog-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:1000; align-items:center; justify-content:center; }
    .dialog-overlay.show { display:flex; }
    .dialog-box { background:white; border-radius:8px; padding:24px; max-width:320px; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.3); }
    .dialog-box p { margin:0 0 16px; font-size:0.9rem; line-height:1.5; white-space:pre-line; }
    .dialog-btns { display:flex; gap:10px; justify-content:center; }
    .dialog-btns button { padding:8px 20px; border:none; border-radius:4px; cursor:pointer; font-size:0.85rem; font-weight:bold; }
    .btn-ok { background:#e67e22; color:white; }
    .btn-cancel { background:#95a5a6; color:white; }

    /* 削除ボタン（セル内） */
    .del-btn {
      font-size: 0.65rem; color: #c0392b; background: none; border: none;
      cursor: pointer; padding: 0 1px; line-height: 1; flex-shrink: 0;
    }
  </style>
  <script src="exceljs.min.js"></script>
</head>
<body>
  <div class="top-bar">
    <a href="index.html">← メニュー</a>
    <div class="date-nav">
      <button onclick="changeDate(-1)">◀</button>
      <span class="date-label" id="date-label">読込中...</span>
      <button onclick="changeDate(1)">▶</button>
      <button onclick="document.getElementById('date-picker').showPicker()" style="background:#444;font-size:0.75rem">📅</button>
      <input type="date" id="date-picker" style="position:absolute;opacity:0;width:0;height:0;" onchange="onDatePicked(this.value)">
    </div>
    <button class="btn-top btn-recreate" onclick="recreate()">🔄 再作成</button>
    <button class="btn-top btn-excel" onclick="exportExcel()">📊 Excel出力</button>
    <button class="btn-top btn-config" onclick="location.href='banmen_config.html'">⚙ 設定</button>
  </div>

  <div id="msg" class="msg"></div>
  <div id="loading" class="loading">読み込み中...</div>

  <div class="main-layout" id="main-layout" style="display:none">

  <div class="dialog-overlay" id="dialog">
    <div class="dialog-box">
      <p id="dialog-msg"></p>
      <div class="dialog-btns">
        <button class="btn-ok" onclick="dialogOk()">入力する</button>
        <button class="btn-cancel" onclick="dialogCancel()">キャンセル</button>
      </div>
    </div>
  </div>
    <!-- 左パネル -->
    <div class="left-panel" id="left-panel">
      <div class="list-section staff-section">
        <div class="list-section-title">👤 社員</div>
        <div class="list-scroll"><div id="staff-list"></div></div>
      </div>
      <div class="list-section car-section">
        <div class="list-section-title">🚛 車両</div>
        <div class="list-scroll"><div id="car-list"></div></div>
      </div>
      <div class="list-section haken-section">
        <div class="list-section-title">🏢 派遣</div>
        <div class="list-scroll"><div id="haken-list"></div></div>
      </div>
    </div>

    <!-- メインエリア -->
    <div class="main-area" id="main-area">
      <div class="board-grid" id="board-grid"></div>
    </div>
  </div>

  <script>
    let masters = {};
    let currentDate = new Date();
    let banmenData = [];    // shift_banmen
    let hakenData = [];     // shift_banmen_haken
    let oenData = [];       // shift_banmen_oen
    let configData = [];    // shift_banmen_config
    let staffRows = [];
    let carRows = [];
    let hakenRows = [];
    let dragInfo = null;    // ドラッグ中の情報
    let tekiseiMap = {};    // 業務適性
    let dialogResolve = null;
    let gyomuReverseMap = {}; // bushoCode|gyomuName → gyomu_code（業務シフト同期用）
    let currentDayCol = '';   // その日のd列名（d01〜d31）

    // ===== 初期化 =====
    async function init() {
      masters = await loadMasters();
      await loadData();
    }

    function getDateStr(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${y}${m}${day}`;
    }

    function getDateLabel(d) {
      const y = d.getFullYear();
      const m = d.getMonth()+1;
      const day = d.getDate();
      const wds = ['日','月','火','水','木','金','土'];
      const wd = wds[d.getDay()];
      return `${y}年${m}月${day}日（${wd}）`;
    }

    function changeDate(delta) {
      currentDate.setDate(currentDate.getDate() + delta);
      loadData();
    }

    function onDatePicked(str) {
      if (!str) return;
      const [y, m, d] = str.split('-').map(Number);
      currentDate = new Date(y, m - 1, d);
      loadData();
    }

    // ===== データ読み込み =====
    async function loadData() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('main-layout').style.display = 'none';

      const dateStr = getDateStr(currentDate);
      document.getElementById('date-label').textContent = getDateLabel(currentDate);

      const yearMonth = getYearMonth(currentDate);
      const dayCol = getDayCol(currentDate);

      const [staffRes, carRes, hakenRes, configRes, banmenRes, banmenHakenRes, oenRes, tekiseiRes, gyomuRes, gyomuShiftRes] = await Promise.all([
        sb.from('shift_staff').select('*').order('staff_code'),
        sb.from('shift_car').select('*').order('car_code'),
        sb.from('shift_haken').select('*').order('haken_name'),
        sb.from('shift_banmen_config').select('*').order('hyoji_jun'),
        sb.from('shift_banmen').select('*').eq('date', dateStr),
        sb.from('shift_banmen_haken').select('*').eq('date', dateStr),
        sb.from('shift_banmen_oen').select('*').eq('date', dateStr),
        sb.from('shift_gyomu_tekisei').select('staff_code, gyomu_code, busho_code'),
        sb.from('shift_gyomu').select('gyomu_code, busho_code, gyomu_name'),
        sb.from('shift_gyomu_shift').select(`staff_code, ${dayCol}`).eq('yearmonth', yearMonth),
      ]);

      staffRows = (staffRes.data || []).filter(s => !s.retired);
      carRows = carRes.data || [];
      hakenRows = hakenRes.data || [];
      configData = configRes.data || [];
      banmenData = banmenRes.data || [];
      hakenData = banmenHakenRes.data || [];
      oenData = oenRes.data || [];

      tekiseiMap = {};
      (tekiseiRes.data || []).forEach(r => {
        if (!tekiseiMap[r.staff_code]) tekiseiMap[r.staff_code] = [];
        tekiseiMap[r.staff_code].push({ gyomu_code: r.gyomu_code, busho_code: r.busho_code });
      });

      // 業務コード→業務マスタのマップ
      const gyomuMap = {};
      (gyomuRes.data || []).forEach(g => { gyomuMap[g.gyomu_code] = g; });

      // 業務シフト同期用：bushoCode|gyomuName → gyomu_code の逆引きマップを構築
      gyomuReverseMap = {};
      (gyomuRes.data || []).forEach(g => {
        const key = g.busho_code + '|' + g.gyomu_name;
        gyomuReverseMap[key] = g.gyomu_code;
      });
      currentDayCol = dayCol;

      // その日の業務シフト（社員コード→業務コード）
      const dayShiftList = (gyomuShiftRes.data || [])
        .map(r => ({ staff_code: r.staff_code, gyomu_code: r[dayCol] }))
        .filter(r => r.gyomu_code && r.gyomu_code !== 'EMPTY');

      // shift_banmenにまだないデータを業務シフトから自動組み立てして保存
      await autoFillBanmen(dateStr, dayShiftList, gyomuMap);

      buildLeftPanel();
      buildBoard();

      document.getElementById('loading').style.display = 'none';
      document.getElementById('main-layout').style.display = 'flex';
    }

    // ===== 年月文字列（yearmonth列用）=====
    function getYearMonth(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      return `${y}${m}`;
    }

    // ===== 日付の列名（d01〜d31）=====
    function getDayCol(d) {
      return `d${String(d.getDate()).padStart(2, '0')}`;
    }

    // ===== 業務シフトから盤面を自動組み立て（既存データがない分のみ）=====
    async function autoFillBanmen(dateStr, dayShiftList, gyomuMap) {
      // busho_code + gyomu_code(配送/倉庫/事務) ごとに「既存データがあるか」を見る
      function hasExisting(bushoCode, gyomuName) {
        return banmenData.some(r => r.busho_code === bushoCode && r.gyomu_code === gyomuName);
      }

      const toInsert = []; // shift_banmenへの新規挿入レコード
      const soukoJimuGroups = {}; // key: busho_code|gyomu_name → 社員コード配列

      const KYUJITSU_MAP = { '901': '休日', '902': '有休', '903': '健診' };

      dayShiftList.forEach(({ staff_code, gyomu_code }) => {
        // 休日・有休・健診（901/902/903）→ お休みカードへ
        if (KYUJITSU_MAP[gyomu_code]) {
          const key = 'お休み|' + KYUJITSU_MAP[gyomu_code];
          if (!soukoJimuGroups[key]) soukoJimuGroups[key] = [];
          soukoJimuGroups[key].push(staff_code);
          return;
        }

        const gyomu = gyomuMap[gyomu_code];
        if (!gyomu) return; // マスタにないコードは無視
        const bushoCode = gyomu.busho_code;
        const gyomuName = gyomu.gyomu_name;

        if (gyomuName === '倉庫' || gyomuName === '事務') {
          // 番号なし → 社員コード順に詰める対象として集める
          const key = bushoCode + '|' + gyomuName;
          if (!soukoJimuGroups[key]) soukoJimuGroups[key] = [];
          soukoJimuGroups[key].push(staff_code);
          return;
        }

        // 運転1〜・助手1〜のような「数字で終わる」業務名のみ配送テーブルへ
        const m = gyomuName.match(/^(運転|助手)(\d+)$/);
        if (!m) return; // 番号なしの「運転」「助手」、所属名そのものなどは対象外

        const kindWord = m[1];
        const rowNo = parseInt(m[2], 10);
        const field = kindWord === '運転' ? 'driver' : 'jyoshu1';

        toInsert.push({ bushoCode, gyomuName: '配送', rowNo, field, staff_code });
      });

      // ----- 配送テーブルへの自動配置 -----
      const driverInserts = {}; // 新規insert用: key: bushoCode|rowNo
      const fieldUpdates = [];  // 既存行への補完update用: { id, field, staff_code }

      // 運転者の社員コード→車番（社員マスタに紐づく車両）を引けるようにしておく
      function getLinkedCar(staffCode) {
        const staff = staffRows.find(s => s.staff_code === staffCode);
        const car = staff?.car_code;
        return (car && car !== 'EMPTY') ? car : null;
      }

      toInsert.forEach(({ bushoCode, gyomuName, rowNo, field, staff_code }) => {
        const existingRow = banmenData.find(
          r => r.busho_code === bushoCode && r.gyomu_code === '配送' && r.row_no === rowNo
        );

        if (existingRow) {
          // 既存行がある場合：そのフィールドが空なら補完update
          if (!existingRow[field]) {
            fieldUpdates.push({ id: existingRow.id, field, staff_code });
            // 運転者を新しく入れる時、車番欄がまだ空なら車番も一緒に補完する
            if (field === 'driver' && !existingRow.car_code) {
              const linkedCar = getLinkedCar(staff_code);
              if (linkedCar) fieldUpdates.push({ id: existingRow.id, field: 'car_code', staff_code: linkedCar });
            }
          }
          return;
        }

        // 既存行がない → 新規insert
        const key = bushoCode + '|' + rowNo;
        if (!driverInserts[key]) driverInserts[key] = { busho_code: bushoCode, gyomu_code: '配送', row_no: rowNo };
        driverInserts[key][field] = staff_code;
        // 運転者を新規に配置する場合、車番も一緒にセットする
        if (field === 'driver' && !driverInserts[key].car_code) {
          const linkedCar = getLinkedCar(staff_code);
          if (linkedCar) driverInserts[key].car_code = linkedCar;
        }
      });

      // 既存行への補完update（空フィールドに人を追加）
      for (const { id, field, staff_code } of fieldUpdates) {
        const { error: updErr } = await sb.from('shift_banmen').update({ [field]: staff_code }).eq('id', id);
        if (updErr) {
          console.error('フィールド補完の更新に失敗しました', updErr);
        } else {
          const idx = banmenData.findIndex(r => r.id === id);
          if (idx !== -1) banmenData[idx][field] = staff_code;
        }
      }

      // ----- 倉庫・事務への自動配置（既存データがない所属+業務のみ）-----
      const soukoJimuInserts = [];
      Object.entries(soukoJimuGroups).forEach(([key, staffCodes]) => {
        const [bushoCode, gyomuName] = key.split('|');
        if (hasExisting(bushoCode, gyomuName)) return;
        staffCodes.sort();
        staffCodes.forEach((staff_code, idx) => {
          soukoJimuInserts.push({
            busho_code: bushoCode, gyomu_code: gyomuName, row_no: idx + 1, driver: staff_code,
          });
        });
      });

      const records = [...Object.values(driverInserts), ...soukoJimuInserts];
      if (records.length > 0) {
        const inserts = records.map(r => ({ date: dateStr, ...r }));
        const { data, error } = await sb.from('shift_banmen').insert(inserts).select();
        if (error) {
          console.error('自動配置の保存に失敗しました', error);
        } else {
          banmenData.push(...(data || []));
        }
      }
    }

    // ===== 左パネル構築 =====
    function buildLeftPanel() {
      // 配置済みのstaff_codeを収集
      const usedStaff = new Set();
      banmenData.forEach(r => {
        if (r.driver)  usedStaff.add(r.driver);
        if (r.jyoshu1) usedStaff.add(r.jyoshu1);
        if (r.jyoshu2) usedStaff.add(r.jyoshu2);
        // smaho欄は同じ人が運転・助手と兼務できるので左リストから除外しない
      });
      oenData.forEach(r => { if (r.staff_code) usedStaff.add(r.staff_code); });

      const usedCars = new Set(banmenData.filter(r => r.car_code).map(r => r.car_code));
      const usedHaken = new Set();
      hakenData.forEach(r => { if (r.haken_name) usedHaken.add(r.haken_name + '_' + r.renban); });

      // 社員リスト
      const staffList = document.getElementById('staff-list');
      staffList.innerHTML = '';
      staffRows.forEach(s => {
        if (usedStaff.has(s.staff_code)) return; // 配置済みは非表示
        const el = document.createElement('div');
        el.className = 'list-item staff';
        el.textContent = s.name || s.staff_code;
        el.draggable = true;
        el.dataset.type = 'staff';
        el.dataset.code = s.staff_code;
        el.dataset.name = s.name || s.staff_code;
        el.addEventListener('dragstart', onDragStart);
        staffList.appendChild(el);
      });

      // 車両リスト
      const carList = document.getElementById('car-list');
      carList.innerHTML = '';
      carRows.forEach(c => {
        if (usedCars.has(c.car_code)) return;
        const el = document.createElement('div');
        el.className = 'list-item car';
        el.textContent = c.car_code;
        el.draggable = true;
        el.dataset.type = 'car';
        el.dataset.code = c.car_code;
        el.dataset.name = c.car_code;
        el.addEventListener('dragstart', onDragStart);
        carList.appendChild(el);
      });

      // 派遣リスト
      const hakenList = document.getElementById('haken-list');
      hakenList.innerHTML = '';
      hakenRows.forEach(h => {
        const el = document.createElement('div');
        el.className = 'list-item haken';
        el.textContent = h.haken_name;
        el.draggable = true;
        el.dataset.type = 'haken';
        el.dataset.code = h.haken_name;
        el.dataset.name = h.haken_name;
        el.addEventListener('dragstart', onDragStart);
        hakenList.appendChild(el);
      });
    }

    // ===== 盤面構築 =====
    function buildBoard() {
      const grid = document.getElementById('board-grid');
      grid.innerHTML = '';

      // 全カードの情報をまとめる（所属カード＋お休み＋応援）
      const allCards = [];

      // col_no・row_noは0始まり → +1して1始まりに変換して使う
      // 所属ごとにグループ化（同じbusho_codeのブロックを1カードにまとめる）
      const bushoGroups = {};
      configData.forEach(c => {
        if (c.sp_jun === 99 || c.sp_jun === 98) return;
        if (!bushoGroups[c.busho_code]) {
          // busho_hyoji_junでカードの列・行位置を決める
          // col_no（0始まり）→ +1で1始まりに
          bushoGroups[c.busho_code] = {
            col: (c.col_no || 0) + 1,
            row: (c.row_no || 0) + 1,
            hyoji: c.busho_hyoji_jun || 0,
            items: []
          };
        }
        bushoGroups[c.busho_code].items.push(c);
      });

      Object.entries(bushoGroups).forEach(([bushoCode, grp]) => {
        allCards.push({ type: 'busho', bushoCode, col: grp.col, row: grp.row, hyoji: grp.hyoji, items: grp.items });
      });

      // お休みカード（col_no/row_noも0始まり）
      const yasumiConfig = configData.find(c => c.sp_jun === 99);
      if (yasumiConfig) {
        allCards.push({
          type: 'yasumi',
          col: (yasumiConfig.col_no || 0) + 1,
          row: (yasumiConfig.row_no || 0) + 1,
          hyoji: yasumiConfig.busho_hyoji_jun ?? 999,
          cfg: yasumiConfig
        });
      }

      // 応援カード
      const oenConfig = configData.find(c => c.sp_jun === 98);
      if (oenConfig) {
        allCards.push({
          type: 'oen',
          col: (oenConfig.col_no || 0) + 1,
          row: (oenConfig.row_no || 0) + 1,
          hyoji: oenConfig.busho_hyoji_jun ?? 999,
          cfg: oenConfig
        });
      }

      // ===== スマホ表示：左パネルなし・SP順（busho_hyoji_jun）で縦一列 =====
      if (window.innerWidth <= 768) {
        allCards.sort((a, b) => (a.hyoji || 0) - (b.hyoji || 0));

        grid.style.gridTemplateColumns = '1fr';
        grid.style.alignItems = 'stretch';

        const colDiv = document.createElement('div');
        colDiv.style.cssText = 'display:flex;flex-direction:column;gap:8px;';
        allCards.forEach(c => {
          let card;
          if (c.type === 'busho') {
            const busho = masters.bushoMap[c.bushoCode];
            card = buildBushoCard(c.bushoCode, busho, c.items);
          } else if (c.type === 'yasumi') {
            card = buildYasumiCard(c.cfg);
          } else if (c.type === 'oen') {
            card = buildOenCard(c.cfg);
          }
          if (card) colDiv.appendChild(card);
        });
        grid.appendChild(colDiv);
        return;
      }

      // 最大列数を求める（PC表示）
      const maxCol = Math.max(...allCards.map(c => c.col), 1);

      // 列ごとにカードを分けてrow順でソート
      const columns = {};
      for (let col = 1; col <= maxCol; col++) columns[col] = [];
      allCards.forEach(c => {
        if (!columns[c.col]) columns[c.col] = [];
        columns[c.col].push(c);
      });
      Object.values(columns).forEach(col => col.sort((a, b) => a.row !== b.row ? a.row - b.row : (a.hyoji || 0) - (b.hyoji || 0)));

      // 列ごとにdivを作ってその中にカードを積む
      grid.style.gridTemplateColumns = `repeat(${maxCol}, 1fr)`;
      grid.style.alignItems = 'start';

      for (let col = 1; col <= maxCol; col++) {
        const colDiv = document.createElement('div');
        colDiv.style.cssText = 'display:flex;flex-direction:column;gap:8px;';
        (columns[col] || []).forEach(c => {
          let card;
          if (c.type === 'busho') {
            const busho = masters.bushoMap[c.bushoCode];
            card = buildBushoCard(c.bushoCode, busho, c.items);
          } else if (c.type === 'yasumi') {
            card = buildYasumiCard(c.cfg);
          } else if (c.type === 'oen') {
            card = buildOenCard(c.cfg);
          }
          if (card) colDiv.appendChild(card);
        });
        grid.appendChild(colDiv);
      }
    }

    // ===== 所属カード =====
    function buildBushoCard(bushoCode, busho, configs) {
      const card = document.createElement('div');
      card.className = 'busho-card';

      const color = busho?.color_h || '#888';
      card.innerHTML = `<div class="busho-header" style="background:${color};color:${getTextColor(color)}">${busho?.busho_name || bushoCode}</div>`;

      const body = document.createElement('div');
      body.className = 'busho-body';

      // hyoji_jun順でブロックを並べる
      configs.sort((a, b) => a.hyoji_jun - b.hyoji_jun).forEach(cfg => {
        const block = buildGyomuBlock(bushoCode, cfg);
        body.appendChild(block);
      });

      card.appendChild(body);
      return card;
    }

    // ===== 業務ブロック =====
    function buildGyomuBlock(bushoCode, cfg) {
      const block = document.createElement('div');
      block.className = 'gyomu-block';

      const gyomuName = cfg.gyomu_code;
      const labelClass = gyomuName === '配送' ? 'haiso' : gyomuName === '倉庫' ? 'souko' : 'jimu';
      block.innerHTML = `<div class="gyomu-label ${labelClass}">${gyomuName}</div>`;

      if (gyomuName === '配送') {
        block.appendChild(buildHaisoTable(bushoCode, cfg));
      } else {
        block.appendChild(buildPersonGrid(bushoCode, cfg));
      }

      return block;
    }

    // ===== 配送テーブル =====
    function buildHaisoTable(bushoCode, cfg) {
      const rowCount = cfg.row_count || 0;
      const jyoshuCount = cfg.jyoshu_count || 0;
      const osobanRow = cfg.osoban_row && cfg.osoban_row !== 'EMPTY' ? parseInt(cfg.osoban_row) : 0;
      const showSmaho = cfg.smaho_flg === true; // スマホ欄：smaho_flgがtrueの所属のみ

      const table = document.createElement('table');
      table.className = 'haiso-table';

      // ヘッダー
      let hdrHtml = '<tr><th>車番</th><th>運転</th>';
      for (let j = 0; j < jyoshuCount; j++) hdrHtml += '<th>助手</th>';
      if (showSmaho) hdrHtml += '<th>📱</th>';
      hdrHtml += '</tr>';
      table.innerHTML = hdrHtml;

      for (let row = 1; row <= rowCount; row++) {
        const rowData = banmenData.find(r =>
          r.busho_code === bushoCode && r.gyomu_code === '配送' && r.row_no === row
        );

        const isOsoban = osobanRow > 0 && row === osobanRow;
        const tr = document.createElement('tr');

        // 車番セル
        const carTd = document.createElement('td');
        const carBox = makeCell('car', bushoCode, '配送', row, 'car_code', rowData?.car_code, isOsoban);
        carBox.classList.add('car-cell');
        carTd.appendChild(carBox);
        tr.appendChild(carTd);

        // 運転手セル
        const driverTd = document.createElement('td');
        driverTd.appendChild(makeCell('staff', bushoCode, '配送', row, 'driver', rowData?.driver, isOsoban));
        tr.appendChild(driverTd);

        // 助手セル
        for (let j = 1; j <= jyoshuCount; j++) {
          const jTd = document.createElement('td');
          const jField = j === 1 ? 'jyoshu1' : 'jyoshu2';
          jTd.appendChild(makeCell('staff', bushoCode, '配送', row, jField, rowData?.[jField], isOsoban));
          tr.appendChild(jTd);
        }

        // スマホ担当セル（沖縄のみ）
        if (showSmaho) {
          const smahoTd = document.createElement('td');
          smahoTd.appendChild(makeCell('staff', bushoCode, '配送', row, 'smaho', rowData?.smaho, isOsoban));
          tr.appendChild(smahoTd);
        }

        table.appendChild(tr);
      }

      return table;
    }

    // ===== 倉庫・事務グリッド（列数対応）=====
    function buildPersonGrid(bushoCode, cfg) {
      const rowCount = cfg.row_count || 0;
      const colCount = cfg.jyoshu_count || 1; // 列数
      const wrap = document.createElement('div');
      wrap.style.cssText = `display:grid;grid-template-columns:repeat(${colCount},1fr);gap:2px;padding:2px;`;

      for (let row = 1; row <= rowCount; row++) {
        const rowData = banmenData.find(r =>
          r.busho_code === bushoCode && r.gyomu_code === cfg.gyomu_code && r.row_no === row
        );
        const box = makeCell('staff', bushoCode, cfg.gyomu_code, row, 'driver', rowData?.driver, false);
        box.className = 'person-box' + (rowData?.driver ? ' filled' : '');
        wrap.appendChild(box);
      }

      return wrap;
    }

    // ===== セル生成 =====
    function makeCell(acceptType, bushoCode, gyomuCode, rowNo, field, value, isOsoban) {
      const box = document.createElement('div');
      box.className = 'cell-box' + (value ? ' filled' : '') + (isOsoban ? ' osoban' : '');
      box.dataset.busho = bushoCode;
      box.dataset.gyomu = gyomuCode;
      box.dataset.row = rowNo;
      box.dataset.field = field;
      box.dataset.accept = acceptType;

      if (value && value !== 'EMPTY') {
        // 表示名を解決
        let displayName = value;
        if (acceptType === 'staff' || field === 'driver' || field === 'jyoshu1' || field === 'jyoshu2' || field === 'smaho') {
          const s = staffRows.find(s => s.staff_code === value);
          displayName = s?.name || value;
        }
        // spanをdraggableにして盤面内ドラッグを可能にする
        const span = document.createElement('span');
        span.style.flex = '1';
        span.textContent = displayName;
        span.draggable = true;
        span.addEventListener('dragstart', e => {
          e.stopPropagation();
          const hakenMatch = acceptType !== 'car' ? isHakenValue(value) : null;
          dragInfo = {
            type: acceptType === 'car' ? 'car' : (hakenMatch ? 'haken' : 'staff'),
            code: value,
            name: displayName,
            // 元のセル情報（盤面内移動の場合に元セルをクリアするため）
            fromBusho: bushoCode,
            fromGyomu: gyomuCode,
            fromRow: rowNo,
            fromField: field,
          };
          e.dataTransfer.effectAllowed = 'move';
        });
        const delBtn = document.createElement('button');
        delBtn.className = 'del-btn';
        delBtn.textContent = '✕';
        delBtn.onclick = (e) => clearCell(e, delBtn);
        box.appendChild(span);
        box.appendChild(delBtn);
      }

      // ドロップイベント
      box.addEventListener('dragover', e => { e.preventDefault(); box.classList.add('drop-over'); });
      box.addEventListener('dragleave', () => box.classList.remove('drop-over'));
      box.addEventListener('drop', e => { e.preventDefault(); box.classList.remove('drop-over'); handleDrop(box); });

      return box;
    }

    // ===== お休みカード =====
    function buildYasumiCard(cfg) {
      const card = document.createElement('div');
      card.className = 'yasumi-card';
      card.innerHTML = `<div class="yasumi-header">お休み</div>`;
      const body = document.createElement('div');
      body.className = 'yasumi-body';

      const colCount = cfg.row_count || 4;
      ['休日', '有休', '健診'].forEach((type, idx) => {
        const typeDiv = document.createElement('div');
        typeDiv.innerHTML = `<div class="yasumi-type">${type}</div>`;
        const grid = document.createElement('div');
        grid.style.cssText = `display:grid;grid-template-columns:repeat(${colCount},1fr);gap:3px;padding:2px;`;

        for (let col = 1; col <= colCount; col++) {
          const rowData = banmenData.find(r =>
            r.busho_code === 'お休み' && r.gyomu_code === type && r.row_no === col
          );
          const box = makeCell('staff', 'お休み', type, col, 'driver', rowData?.driver, false);
          box.className = 'person-box' + (rowData?.driver ? ' filled' : '');
          grid.appendChild(box);
        }
        typeDiv.appendChild(grid);
        body.appendChild(typeDiv);
      });

      card.appendChild(body);
      return card;
    }

    // ===== 応援カード =====
    function buildOenCard(cfg) {
      const card = document.createElement('div');
      card.className = 'oen-card';
      card.innerHTML = `<div class="oen-header">💛 応援</div>`;

      const body = document.createElement('div');
      body.className = 'oen-body';

      // セレクト：社員
      const staffSel = document.createElement('select');
      staffSel.className = 'oen-select';
      staffSel.id = 'oen-staff-sel';
      staffSel.innerHTML = '<option value="">－ 社員 －</option>';
      staffRows.forEach(s => {
        staffSel.innerHTML += `<option value="${s.staff_code}">${s.name || s.staff_code}</option>`;
      });
      body.appendChild(staffSel);

      // セレクト：所属
      const bushoSel = document.createElement('select');
      bushoSel.className = 'oen-select';
      bushoSel.id = 'oen-busho-sel';
      bushoSel.innerHTML = '<option value="">－ 所属 －</option>';
      masters.bushos.filter(b => parseInt(b.busho_code) < 900).forEach(b => {
        bushoSel.innerHTML += `<option value="${b.busho_code}">${b.busho_name}</option>`;
      });
      body.appendChild(bushoSel);

      // 登録ボタン
      const btn = document.createElement('button');
      btn.className = 'oen-btn';
      btn.textContent = '登録';
      btn.onclick = registerOen;
      body.appendChild(btn);

      // 登録済み応援一覧
      const oenList = document.createElement('div');
      oenList.className = 'oen-list';
      oenList.id = 'oen-list';
      renderOenList(oenList);
      body.appendChild(oenList);

      card.appendChild(body);
      return card;
    }

    function renderOenList(container) {
      container.innerHTML = '';
      oenData.forEach((o, idx) => {
        const s = staffRows.find(s => s.staff_code === o.staff_code);
        const b = masters.bushoMap[o.busho_code];
        const item = document.createElement('div');
        item.className = 'oen-item';
        item.innerHTML = `
          <span>${s?.name || o.staff_code} → ${b?.busho_name || o.busho_code}</span>
          <button class="oen-del" onclick="deleteOen(${o.id})">✕</button>`;
        container.appendChild(item);
      });
    }

    async function registerOen() {
      const staffCode = document.getElementById('oen-staff-sel').value;
      const bushoCode = document.getElementById('oen-busho-sel').value;
      if (!staffCode || !bushoCode) { showMsg('社員と所属を選択してください', 'err'); return; }
      const dateStr = getDateStr(currentDate);
      const { data, error } = await sb.from('shift_banmen_oen')
        .insert({ date: dateStr, staff_code: staffCode, busho_code: bushoCode })
        .select().single();
      if (error) { showMsg('登録に失敗しました', 'err'); return; }
      oenData.push(data);
      const list = document.getElementById('oen-list');
      if (list) renderOenList(list);
      showMsg('登録しました', 'ok');
    }

    async function deleteOen(id) {
      const { error } = await sb.from('shift_banmen_oen').delete().eq('id', id);
      if (error) { showMsg('削除に失敗しました', 'err'); return; }
      oenData = oenData.filter(o => o.id !== id);
      const list = document.getElementById('oen-list');
      if (list) renderOenList(list);
    }

    // ===== ドラッグ＆ドロップ =====
    function showDialog(msg) {
      return new Promise(resolve => {
        document.getElementById('dialog-msg').textContent = msg;
        document.getElementById('dialog').classList.add('show');
        dialogResolve = resolve;
      });
    }
    function dialogOk() { document.getElementById('dialog').classList.remove('show'); if (dialogResolve) dialogResolve(true); }
    function dialogCancel() { document.getElementById('dialog').classList.remove('show'); if (dialogResolve) dialogResolve(false); }

    function onDragStart(e) {
      dragInfo = {
        type: e.currentTarget.dataset.type,
        code: e.currentTarget.dataset.code,
        name: e.currentTarget.dataset.name,
      };
      e.dataTransfer.effectAllowed = 'move';
    }

    async function handleDrop(box) {
      if (!dragInfo) return;
      const bushoCode = box.dataset.busho;
      const gyomuCode = box.dataset.gyomu;
      const rowNo = parseInt(box.dataset.row);
      const field = box.dataset.field;
      const acceptType = box.dataset.accept;

      // 型チェック
      if (acceptType === 'car' && dragInfo.type !== 'car') { showMsg('ここには車両をドロップしてください', 'err'); return; }
      if (acceptType === 'staff' && dragInfo.type === 'car') { showMsg('ここには社員または派遣をドロップしてください', 'err'); return; }

      // 業務適性チェック（社員かつ業務コードがある場合のみ。お休みは対象外）
      if (dragInfo.type === 'staff' && acceptType === 'staff' && bushoCode !== 'お休み') {
        const tekisei = tekiseiMap[dragInfo.code] || [];
        const hasTekisei = tekisei.some(t => t.busho_code === bushoCode);
        if (!hasTekisei) {
          const ok = await showDialog(`「${dragInfo.name}」は「${masters.bushoMap[bushoCode]?.busho_name || bushoCode}」の業務適性がありません。\nそれでも入力しますか？`);
          if (!ok) return;
        }
      }

      const dateStr = getDateStr(currentDate);
      let value = dragInfo.code;

      // 既存レコードを探す
      const existing = banmenData.find(r =>
        r.busho_code === bushoCode && r.gyomu_code === gyomuCode && r.row_no === rowNo
      );

      // 派遣（haken）の場合：連番を付けて表示用の値を作り、shift_banmen_hakenにも記録する
      let hakenInsertInfo = null; // 新規配置時に使う
      let hakenMoveRecord = null; // 盤面内移動時に使う
      if (dragInfo.type === 'haken') {
        if (!dragInfo.fromBusho) {
          // 左の派遣リストからの新規配置 → 本日ここまでの件数+1を連番にする
          const renban = hakenData.filter(h => h.haken_name === dragInfo.code).length + 1;
          value = `${dragInfo.code}${renban}`;
          hakenInsertInfo = { date: dateStr, haken_name: dragInfo.code, renban, busho_code: bushoCode, gyomu_code: gyomuCode, row_no: rowNo };
        } else {
          // 盤面内での移動 → 元のレコードを探して置き場所だけ更新する
          hakenMoveRecord = hakenData.find(h =>
            h.busho_code === dragInfo.fromBusho && h.gyomu_code === dragInfo.fromGyomu && h.row_no === dragInfo.fromRow
          );
        }
      }

      // 運転手として配置する場合、社員に紐づく車両があれば自動セット
      const updateData = { [field]: value };
      if (field === 'driver' && dragInfo.type === 'staff') {
        const staff = staffRows.find(s => s.staff_code === dragInfo.code);
        const linkedCar = staff?.car_code;
        const currentCarCode = existing?.car_code;
        // すでに車番欄が埋まっていなければ自動セット
        if (linkedCar && linkedCar !== 'EMPTY' && !currentCarCode) {
          updateData.car_code = linkedCar;
        }
      }

      let error;
      if (existing) {
        ({ error } = await sb.from('shift_banmen').update(updateData).eq('id', existing.id));
        if (!error) Object.assign(existing, updateData);
      } else {
        const insert = { date: dateStr, busho_code: bushoCode, gyomu_code: gyomuCode, row_no: rowNo, ...updateData };
        const res = await sb.from('shift_banmen').insert(insert).select().single();
        error = res.error;
        if (!error) banmenData.push(res.data);
      }

      if (error) { showMsg('保存に失敗しました: ' + error.message, 'err'); return; }

      // 派遣の新規配置 → shift_banmen_hakenへ登録
      if (hakenInsertInfo) {
        const hRes = await sb.from('shift_banmen_haken').insert(hakenInsertInfo).select().single();
        if (hRes.error) {
          console.error('派遣データの記録に失敗しました', hRes.error);
        } else {
          hakenData.push(hRes.data);
        }
      }
      // 派遣の盤面内移動 → shift_banmen_hakenの置き場所を更新
      if (hakenMoveRecord) {
        const { error: hMoveErr } = await sb.from('shift_banmen_haken')
          .update({ busho_code: bushoCode, gyomu_code: gyomuCode, row_no: rowNo })
          .eq('id', hakenMoveRecord.id);
        if (hMoveErr) {
          console.error('派遣データの移動記録に失敗しました', hMoveErr);
        } else {
          hakenMoveRecord.busho_code = bushoCode;
          hakenMoveRecord.gyomu_code = gyomuCode;
          hakenMoveRecord.row_no = rowNo;
        }
      }

      // 盤面内ドラッグの場合、元のセルをクリア（同じセルへのドロップは除く）
      // ただしスマホ欄へのドロップは「コピー」なので元のセルはクリアしない
      if (field !== 'smaho' && dragInfo.fromBusho && !(
        dragInfo.fromBusho === bushoCode &&
        dragInfo.fromGyomu === gyomuCode &&
        dragInfo.fromRow === rowNo &&
        dragInfo.fromField === field
      )) {
        const fromExisting = banmenData.find(r =>
          r.busho_code === dragInfo.fromBusho &&
          r.gyomu_code === dragInfo.fromGyomu &&
          r.row_no === dragInfo.fromRow
        );
        if (fromExisting) {
          const fromClearData = { [dragInfo.fromField]: null };
          // driver移動の場合、元の行の車番もクリア＆移動先に引き継ぐ
          if (dragInfo.fromField === 'driver' && field === 'driver' && fromExisting.car_code) {
            fromClearData.car_code = null;
            // 移動先に車番を追加（移動先にまだ車番がなければ）
            if (!existing?.car_code) {
              const targetExisting = banmenData.find(r =>
                r.busho_code === bushoCode && r.gyomu_code === gyomuCode && r.row_no === rowNo
              );
              if (targetExisting) {
                await sb.from('shift_banmen').update({ car_code: fromExisting.car_code }).eq('id', targetExisting.id);
                targetExisting.car_code = fromExisting.car_code;
              }
            }
          }
          await sb.from('shift_banmen').update(fromClearData).eq('id', fromExisting.id);
          Object.assign(fromExisting, fromClearData);
        }
      }

      // 業務シフト同期（社員の配置変更時。スマホ欄は対象外）
      if (dragInfo.type === 'staff' && field !== 'smaho') {
        const newGyomuCode = resolveGyomuCode(bushoCode, gyomuCode, rowNo, field);

        // 盤面内移動の場合：移動先の業務コードを書く（元の場所は自動的に上書きされる）
        if (dragInfo.fromBusho && !(
          dragInfo.fromBusho === bushoCode && dragInfo.fromGyomu === gyomuCode &&
          dragInfo.fromRow === rowNo && dragInfo.fromField === field
        )) {
          // 移動先の業務コードで上書き（同じ社員コードなので1回で確定）
          if (newGyomuCode) await syncGyomuShift(value, newGyomuCode);
          else await syncGyomuShift(value, null);
        } else {
          // 左リストからのドロップの場合
          if (newGyomuCode) await syncGyomuShift(value, newGyomuCode);
          // 押し出された既存社員はNULLに
          if (existing && existing[field] && existing[field] !== value) {
            await syncGyomuShift(existing[field], null);
          }
        }
      }

      buildLeftPanel();
      buildBoard();
    }

    async function clearCell(e, btn) {
      e.stopPropagation();
      const box = btn.parentElement;
      const bushoCode = box.dataset.busho;
      const gyomuCode = box.dataset.gyomu;
      const rowNo = parseInt(box.dataset.row);
      const field = box.dataset.field;

      const existing = banmenData.find(r =>
        r.busho_code === bushoCode && r.gyomu_code === gyomuCode && r.row_no === rowNo
      );
      if (!existing) return;

      const { error } = await sb.from('shift_banmen').update({ [field]: null }).eq('id', existing.id);
      if (error) { showMsg('削除に失敗しました', 'err'); return; }

      const removedStaff = existing[field];

      // 派遣が置かれていた場合は、shift_banmen_hakenの記録も削除する
      const removedHakenIdx = hakenData.findIndex(h =>
        h.busho_code === bushoCode && h.gyomu_code === gyomuCode && h.row_no === rowNo
      );
      if (removedHakenIdx !== -1) {
        const removedHaken = hakenData[removedHakenIdx];
        const { error: hDelErr } = await sb.from('shift_banmen_haken').delete().eq('id', removedHaken.id);
        if (hDelErr) console.error('派遣データの削除に失敗しました', hDelErr);
        else hakenData.splice(removedHakenIdx, 1);
      } else if (removedStaff) {
        // 外した社員の業務シフトをNULLに更新（派遣ではない場合のみ）
        await syncGyomuShift(removedStaff, null);
      }
      existing[field] = null;

      buildLeftPanel();
      buildBoard();
    }

    // ===== 業務シフト同期（盤面→shift_gyomu_shift）=====
    // staffCode: 対象社員コード
    // gyomuCode: 新しい業務コード（nullなら空欄にする）
    async function syncGyomuShift(staffCode, gyomuCode) {
      if (!staffCode || !currentDayCol) return;
      const yearMonth = getYearMonth(currentDate);
      const { error } = await sb.from('shift_gyomu_shift')
        .update({ [currentDayCol]: gyomuCode })
        .eq('staff_code', staffCode)
        .eq('yearmonth', yearMonth);
      if (error) {
        console.error('業務シフトの同期に失敗しました', error);
      }
    }

    // 盤面のfield（driver/jyoshu1など）と配置場所から業務コードを特定する
    // 例：bushoCode=805, gyomuCode=配送, rowNo=1, field=driver → 805-11（運転1）
    function resolveGyomuCode(bushoCode, gyomuCode, rowNo, field) {
      if (bushoCode === 'お休み') {
        const KYUJITSU_CODE = { '休日': '901', '有休': '902', '健診': '903' };
        return KYUJITSU_CODE[gyomuCode] || null;
      }
      if (gyomuCode === '配送') {
        const gyomuName = field === 'driver' ? `運転${rowNo}` : `助手${rowNo}`;
        return gyomuReverseMap[bushoCode + '|' + gyomuName] || null;
      }
      if (gyomuCode === '倉庫' || gyomuCode === '事務') {
        return gyomuReverseMap[bushoCode + '|' + gyomuCode] || null;
      }
      return null;
    }

    // ===== 1枚の業務ブロックに必要な列数 =====
    function blockWidth(cfg) {
      if (cfg.gyomu_code === '配送') {
        const jyoshuCount = cfg.jyoshu_count || 0;
        const osobanRow = cfg.osoban_row && cfg.osoban_row !== 'EMPTY' ? parseInt(cfg.osoban_row) : 0;
        const showSmaho = cfg.smaho_flg === true;
        return 2 + jyoshuCount + (showSmaho ? 1 : 0) + (osobanRow > 0 ? 1 : 0); // 車番+運転+助手×n+(スマホ)+(遅列)
      }
      return cfg.jyoshu_count || 1; // 倉庫・事務は列数
    }

    // ===== カード全体を太枠で囲む =====
    function applyOuterBorder(sheet, r1, c1, r2, c2) {
      for (let r = r1; r <= r2; r++) {
        for (let c = c1; c <= c2; c++) {
          const cell = sheet.getCell(r, c);
          const b = Object.assign({}, cell.border);
          if (r === r1) b.top = { style: 'medium' };
          if (r === r2) b.bottom = { style: 'medium' };
          if (c === c1) b.left = { style: 'medium' };
          if (c === c2) b.right = { style: 'medium' };
          cell.border = b;
        }
      }
    }

    // ===== 所属カード（配送・倉庫・事務）をExcelに描画 =====
    function drawBushoCardExcel(sheet, bushoCode, items, col0, row0) {
      const busho = masters.bushoMap[bushoCode];
      const bushoName = busho?.busho_name || bushoCode;
      const cardW = Math.max(...items.map(blockWidth), 1);

      // 所属名ヘッダー（カード幅いっぱいに結合、濃い灰色）
      if (cardW > 1) sheet.mergeCells(row0, col0, row0, col0 + cardW - 1);
      const nameCell = sheet.getCell(row0, col0);
      nameCell.value = bushoName;
      nameCell.font = { bold: true, color: { argb: 'FF000000' } };
      nameCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFAAAAAA' } };
      nameCell.alignment = { horizontal: 'center', vertical: 'middle' };
      nameCell.border = { top:{style:'thin'}, bottom:{style:'thin'}, left:{style:'thin'}, right:{style:'thin'} };
      let row = row0 + 1;

      items.slice().sort((a, b) => a.hyoji_jun - b.hyoji_jun).forEach(cfg => {
        const gyomuName = cfg.gyomu_code;
        const rowCount = cfg.row_count || 0;
        const jyoshuCount = cfg.jyoshu_count || 0;

        // 業務ラベル（カード幅いっぱいの薄い灰色バー、左詰め）
        if (cardW > 1) sheet.mergeCells(row, col0, row, col0 + cardW - 1);
        const lblCell = sheet.getCell(row, col0);
        lblCell.value = gyomuName;
        lblCell.font = { bold: true, color: { argb: 'FF000000' } };
        lblCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFDDDDDD' } };
        lblCell.alignment = { horizontal: 'left', vertical: 'middle', indent: 1 };
        row++;

        if (gyomuName === '配送') {
          const osobanRow = cfg.osoban_row && cfg.osoban_row !== 'EMPTY' ? parseInt(cfg.osoban_row) : 0;
          const hasOsobanCol = osobanRow > 0;
          const showSmaho = cfg.smaho_flg === true;

          // ヘッダー行
          const headers = ['車番', '運転'];
          for (let j = 0; j < jyoshuCount; j++) headers.push('助手');
          if (showSmaho) headers.push('スマホ');
          if (hasOsobanCol) headers.push('遅');
          headers.forEach((h, i) => {
            const cell = sheet.getCell(row, col0 + i);
            cell.value = h;
            cell.font = { bold: true };
            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFEEEEEE' } };
            cell.alignment = { horizontal: 'center', vertical: 'middle' };
            cell.border = { top:{style:'thin'}, bottom:{style:'thin'}, left:{style:'thin'}, right:{style:'thin'} };
            sheet.getColumn(col0 + i).width = Math.max(sheet.getColumn(col0 + i).width || 0, h === '車番' ? 9 : (h === '遅' ? 5 : 12));
          });
          row++;

          for (let r = 1; r <= rowCount; r++) {
            const rec = banmenData.find(x => x.busho_code === bushoCode && x.gyomu_code === '配送' && x.row_no === r);
            const isOsoban = hasOsobanCol && r === osobanRow;
            const vals = [rec?.car_code || '', getStaffName(rec?.driver)];
            for (let j = 1; j <= jyoshuCount; j++) vals.push(getStaffName(rec?.[j === 1 ? 'jyoshu1' : 'jyoshu2']));
            if (showSmaho) vals.push(getStaffName(rec?.smaho));
            if (hasOsobanCol) vals.push(isOsoban ? '遅' : '');

            vals.forEach((v, i) => {
              const cell = sheet.getCell(row, col0 + i);
              cell.value = v;
              cell.alignment = { horizontal: 'center', vertical: 'middle' };
              cell.border = { top:{style:'thin'}, bottom:{style:'thin'}, left:{style:'thin'}, right:{style:'thin'} };
              if (i === headers.length - 1 && hasOsobanCol && isOsoban) {
                cell.font = { bold: true };
              }
            });
            row++;
          }
        } else {
          // 倉庫・事務：colCount列のグリッド（rowCountスロット分）
          const colCount = jyoshuCount || 1;
          for (let i = 0; i < rowCount; i++) {
            const rNo = i + 1;
            const rec = banmenData.find(x => x.busho_code === bushoCode && x.gyomu_code === gyomuName && x.row_no === rNo);
            const rr = row + Math.floor(i / colCount);
            const cc = col0 + (i % colCount);
            const cell = sheet.getCell(rr, cc);
            cell.value = getStaffName(rec?.driver);
            cell.alignment = { horizontal: 'center', vertical: 'middle' };
            cell.border = { top:{style:'thin'}, bottom:{style:'thin'}, left:{style:'thin'}, right:{style:'thin'} };
            sheet.getColumn(cc).width = Math.max(sheet.getColumn(cc).width || 0, 12);
          }
          row += Math.ceil(rowCount / colCount) || 1;
        }
      });

      const cardBottomRow = row - 1;
      applyOuterBorder(sheet, row0, col0, cardBottomRow, col0 + cardW - 1);
      row++; // カード間の空白行

      return row;
    }

    // ===== お休みカードをExcelに描画 =====
    function drawYasumiCardExcel(sheet, cfg, col0, row0) {
      const colCount = cfg.row_count || 4;
      if (colCount > 1) sheet.mergeCells(row0, col0, row0, col0 + colCount - 1);
      const hdr = sheet.getCell(row0, col0);
      hdr.value = 'お休み';
      hdr.font = { bold: true };
      hdr.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFAAAAAA' } };
      hdr.alignment = { horizontal: 'center', vertical: 'middle' };
      let row = row0 + 1;

      ['休日', '有休', '健診'].forEach(type => {
        if (colCount > 1) sheet.mergeCells(row, col0, row, col0 + colCount - 1);
        const lbl = sheet.getCell(row, col0);
        lbl.value = type;
        lbl.font = { bold: true, color: { argb: 'FF000000' } };
        lbl.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFDDDDDD' } };
        lbl.alignment = { horizontal: 'left', vertical: 'middle', indent: 1 };
        row++;
        for (let c = 1; c <= colCount; c++) {
          const rec = banmenData.find(x => x.busho_code === 'お休み' && x.gyomu_code === type && x.row_no === c);
          const cell = sheet.getCell(row, col0 + c - 1);
          cell.value = rec?.driver ? getStaffName(rec.driver) : '';
          cell.alignment = { horizontal: 'center', vertical: 'middle' };
          cell.border = { top:{style:'thin'}, bottom:{style:'thin'}, left:{style:'thin'}, right:{style:'thin'} };
        }
        row++;
      });
      const bottomRow = row - 1;
      applyOuterBorder(sheet, row0, col0, bottomRow, col0 + colCount - 1);
      row++; // 空白行
      return row;
    }

    // ===== 応援カードをExcelに描画 =====
    function drawOenCardExcel(sheet, groupWidth, col0, row0) {
      if (groupWidth > 1) sheet.mergeCells(row0, col0, row0, col0 + groupWidth - 1);
      const hdr = sheet.getCell(row0, col0);
      hdr.value = '応援';
      hdr.font = { bold: true };
      hdr.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFAAAAAA' } };
      hdr.alignment = { horizontal: 'center', vertical: 'middle' };
      let row = row0 + 1;

      oenData.forEach(o => {
        const s = staffRows.find(x => x.staff_code === o.staff_code);
        const b = masters.bushoMap[o.busho_code];
        const nameColSpan = 1;
        const deptColSpan = 1;
        const deptColStart = col0 + nameColSpan;

        if (nameColSpan > 1) sheet.mergeCells(row, col0, row, col0 + nameColSpan - 1);
        const nameCell = sheet.getCell(row, col0);
        nameCell.value = s?.name || o.staff_code;
        nameCell.alignment = { horizontal: 'center', vertical: 'middle' };
        nameCell.border = { top:{style:'thin'}, bottom:{style:'thin'}, left:{style:'thin'}, right:{style:'thin'} };

        if (deptColSpan > 1) sheet.mergeCells(row, deptColStart, row, deptColStart + deptColSpan - 1);
        const deptCell = sheet.getCell(row, deptColStart);
        deptCell.value = b?.busho_name || o.busho_code;
        deptCell.font = { bold: true };
        deptCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFDDDDDD' } };
        deptCell.alignment = { horizontal: 'center', vertical: 'middle' };
        deptCell.border = { top:{style:'thin'}, bottom:{style:'thin'}, left:{style:'thin'}, right:{style:'thin'} };
        row++;
      });
      const bottomRow = Math.max(row - 1, row0);
      applyOuterBorder(sheet, row0, col0, bottomRow, col0 + groupWidth - 1);
      row++; // 空白行
      return row;
    }

    // ===== Excel出力（盤面）=====
    async function exportExcel() {
      const dateStr = getDateStr(currentDate);
      const dateLabel = getDateLabel(currentDate);
      const workbook = new ExcelJS.Workbook();
      const sheet = workbook.addWorksheet('盤面');

      // ---- 画面と同じ「列」構成を作る（buildBoardと同じロジック）----
      const allCards = [];
      const bushoGroups = {};
      configData.forEach(c => {
        if (c.sp_jun === 99 || c.sp_jun === 98) return;
        if (!bushoGroups[c.busho_code]) {
          bushoGroups[c.busho_code] = { col: (c.col_no || 0) + 1, row: (c.row_no || 0) + 1, hyoji: c.busho_hyoji_jun || 0, items: [] };
        }
        bushoGroups[c.busho_code].items.push(c);
      });
      Object.entries(bushoGroups).forEach(([bushoCode, grp]) => {
        allCards.push({ type: 'busho', bushoCode, col: grp.col, row: grp.row, hyoji: grp.hyoji, items: grp.items });
      });
      const yasumiConfig = configData.find(c => c.sp_jun === 99);
      if (yasumiConfig) allCards.push({ type: 'yasumi', col: (yasumiConfig.col_no || 0) + 1, row: (yasumiConfig.row_no || 0) + 1, cfg: yasumiConfig });
      const oenConfig = configData.find(c => c.sp_jun === 98);
      if (oenConfig) allCards.push({ type: 'oen', col: (oenConfig.col_no || 0) + 1, row: (oenConfig.row_no || 0) + 1, cfg: oenConfig });

      const maxCol = Math.max(...allCards.map(c => c.col), 1);
      const columns = {};
      for (let col = 1; col <= maxCol; col++) columns[col] = [];
      allCards.forEach(c => columns[c.col].push(c));
      Object.values(columns).forEach(col => col.sort((a, b) => a.row !== b.row ? a.row - b.row : (a.hyoji || 0) - (b.hyoji || 0)));

      // 各グループの必要幅（そのグループにある一番広いカードに合わせる）
      function cardOwnWidth(c) {
        if (c.type === 'busho') return Math.max(...c.items.map(blockWidth), 1);
        if (c.type === 'yasumi') return c.cfg.row_count || 4;
        return 2; // oen
      }
      const groupWidths = {};
      for (let col = 1; col <= maxCol; col++) {
        groupWidths[col] = Math.max(...(columns[col].length ? columns[col].map(cardOwnWidth) : [2]));
      }

      // 各グループの開始列（グループ間に1列の間隔）
      const groupStartCol = {};
      let cursor = 1;
      for (let col = 1; col <= maxCol; col++) {
        groupStartCol[col] = cursor;
        cursor += groupWidths[col] + 1;
      }
      const totalWidth = cursor - 2; // 最後の間隔分を引く

      // タイトル行
      if (totalWidth > 1) sheet.mergeCells(1, 1, 1, totalWidth);
      const titleCell = sheet.getCell(1, 1);
      titleCell.value = dateLabel;
      titleCell.font = { bold: true, size: 13 };
      titleCell.alignment = { horizontal: 'center' };

      // 各グループを描画
      for (let col = 1; col <= maxCol; col++) {
        const col0 = groupStartCol[col];
        let row = 2;
        columns[col].forEach(c => {
          if (c.type === 'busho') {
            row = drawBushoCardExcel(sheet, c.bushoCode, c.items, col0, row);
          } else if (c.type === 'yasumi') {
            row = drawYasumiCardExcel(sheet, c.cfg, col0, row);
          } else if (c.type === 'oen') {
            row = drawOenCardExcel(sheet, groupWidths[col], col0, row);
          }
        });
      }

      // 行の高さを少し大きくする
      sheet.properties.defaultRowHeight = 20;
      sheet.eachRow(r => { if (!r.height) r.height = 20; });

      // 完全に空っぽの列は幅を狭くする（1行目のタイトルは結合されているため除外）
      const lastRow = sheet.lastRow ? sheet.lastRow.number : 1;
      for (let c = 1; c <= totalWidth; c++) {
        let hasValue = false;
        for (let r = 2; r <= lastRow; r++) {
          const v = sheet.getCell(r, c).value;
          if (v !== null && v !== undefined && v !== '') { hasValue = true; break; }
        }
        if (!hasValue) sheet.getColumn(c).width = 3;
      }

      // ダウンロード
      const buf = await workbook.xlsx.writeBuffer();
      const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `盤面_${dateStr}.xlsx`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // 値が派遣会社の割り当て（例: "AAAAAA3"）かどうかを判定する
    function isHakenValue(value) {
      if (!value) return null;
      return hakenRows.find(h => value.startsWith(h.haken_name) && /^\d*$/.test(value.slice(h.haken_name.length)));
    }

    // 社員コードから氏名を取得
    function getStaffName(code) {
      if (!code) return '';
      const s = staffRows.find(s => s.staff_code === code);
      return s?.name || code;
    }
    async function recreate() {
      if (!confirm('本日のシフトデータから盤面を再作成しますか？\n※現在の盤面データは上書きされます')) return;
      showMsg('再作成中...', 'ok');
      // TODO: shift_gyomu_shiftから盤面を自動生成する処理
      showMsg('再作成機能は今後実装予定です', 'err');
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = `msg ${type}`;
      setTimeout(() => { el.className = 'msg'; }, 3000);
    }

    init();
  </script>
